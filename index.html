<!DOCTYPE html>
<html>
<head>
  <title>For my beautiful girl ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #1a001a, #000000);
  overflow: hidden;
  color: white;
  font-family: 'Poppins', sans-serif;
  text-align: center;
}

#login {
  position: absolute;
  top: 40%;
  width: 100%;
  z-index: 10;
}

h2 {
  font-family: 'Great Vibes', cursive;
  font-size: 48px;
  color: #ff4d6d;
  text-shadow: 0 0 15px rgba(255, 77, 109, 0.6);
}

input {
  padding: 12px 15px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: #ff4d6d;
  text-align: center;
  box-shadow: 0 0 10px rgba(255,255,255,0.2), 0 0 20px rgba(255,105,180,0.3);
  text-shadow: 0 0 8px rgba(255, 77, 109, 0.8);
  transition: 0.3s;
}

input:focus {
  box-shadow: 0 0 15px #ff4d6d, 0 0 30px #ff69b4;
}

input::placeholder {
  color: #ff85a2;
  opacity: 0.7;
}

button {
  padding: 10px 20px;
  border-radius: 10px;
  background: pink;
}

#matrix-phase {
  position: absolute;
  inset: 0;
  display: none;
  z-index: 50;
}

#countdown-num {
  position: absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-size:120px;
  color:#ff69b4;
  z-index:60;
  opacity:0;
  text-shadow:0 0 20px #ff1493,0 0 50px #ff69b4;
}

.heart {
  position:absolute;
  animation:fall 5s linear forwards;
}

@keyframes fall {
  to { transform:translateY(110vh); opacity:0; }
}

.wish {
  position:absolute;
  font-family:'Great Vibes';
  color:#ff85c1;
  text-shadow:0 0 10px #ff1493,0 0 30px #ff69b4;
}

#nextBtn {
  position:fixed;
  bottom:30px;
  right:30px;
  font-family:'Great Vibes';
  font-size:32px;
  color:#ff69b4;
  text-shadow:0 0 10px #ff1493,0 0 30px #ff69b4;
  opacity:0;
}

#nextBtn.show { opacity:1; }

.webgl {
  position:fixed;
  inset:0;
  display:none;
  z-index:1;
}

/* Teks floating galaxy */
#galaxy-text {
  position: fixed;
  width: 100%;
  top: 8%;
  z-index: 5;
  display: none;
  pointer-events: none;
}

#galaxy-text .line1 {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(32px, 7vw, 60px);
  color: #fff;
  text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff1493;
  opacity: 0;
  transform: translateY(-20px);
  transition: opacity 2s ease, transform 2s ease;
}

#galaxy-text .line2 {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(28px, 6vw, 52px);
  color: #ffb3c6;
  text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff1493;
  margin-top: 8px;
  opacity: 0;
  transform: translateY(-20px);
  transition: opacity 2s ease 0.8s, transform 2s ease 0.8s;
}

#galaxy-text.show .line1,
#galaxy-text.show .line2 {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<canvas class="webgl"></canvas>

<!-- Teks galaxy — hanya muncul waktu galaxy -->
<div id="galaxy-text">
  <div class="line1">Happy Birthday Sayang 🎂❤️</div>
  <div class="line2">I Love You So Much 💕</div>
</div>

<div id="login">
  <h2>Only For Birthday Girl 💌</h2>
  <input type="password" id="pass">
  <br><br>
  <button onclick="check()">Open 💖</button>
</div>

<div id="matrix-phase">
  <canvas id="matrixCanvas"></canvas>
</div>

<div id="countdown-num"></div>
<div id="nextBtn" onclick="goNext()">next</div>

<audio id="music" loop>
  <source src="song.mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
var galaxyStarted = false;

function startGalaxy() {
  if (galaxyStarted) return;
  galaxyStarted = true;

  const canvas = document.querySelector('.webgl');
  canvas.style.display = 'block';
  canvas.style.opacity = '1';

  // Tunjuk teks selepas 2 saat
  setTimeout(function() {
    document.getElementById('galaxy-text').style.display = 'block';
    setTimeout(function() {
      document.getElementById('galaxy-text').classList.add('show');
    }, 100);
  }, 2000);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 200);
  camera.position.set(0, 0, 55);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setClearColor('#00000a');

  /* ⭐ BINTANG BACKGROUND */
  const starPos = new Float32Array(4000 * 3);
  for (let i = 0; i < 4000 * 3; i++) starPos[i] = (Math.random() - 0.5) * 300;
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({
    color: 0xffffff, size: 0.12, transparent: true, opacity: 0.7
  })));

  /* ❤️ HEART SHAPE PARTICLES */
  // Formula parametrik heart 3D — tersebar dalam volume heart
  function heartXY(t) {
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
    return { x: x * 0.38, y: y * 0.38 };
  }

  const heartCount = 60000;
  const heartPos = new Float32Array(heartCount * 3);
  const heartColors = new Float32Array(heartCount * 3);

  for (let i = 0; i < heartCount; i++) {
    const i3 = i * 3;
    // sample titik dalam volume heart
    const t = Math.random() * Math.PI * 2;
    const r = Math.pow(Math.random(), 0.5); // density lebih dekat surface
    const p = heartXY(t);
    const noise = (1 - r) * 1.2;

    const px = p.x * r + (Math.random() - 0.5) * noise;
    const py = p.y * r + (Math.random() - 0.5) * noise;
    const pz = (Math.random() - 0.5) * 4 * r; // sikit depth

    heartPos[i3]   = px;
    heartPos[i3+1] = py;
    heartPos[i3+2] = pz;

    // Warna: tengah lebih terang, tepi lebih gelap
    const dist = Math.sqrt(px*px + py*py);
    const bright = 0.5 + Math.random() * 0.5;
    const c = new THREE.Color();
    if (Math.random() < 0.03) {
      c.set('#ffffff'); // sparkle
    } else {
      c.setHSL(0.0 + Math.random() * 0.03, 1.0, bright * 0.55);
    }
    heartColors[i3] = c.r; heartColors[i3+1] = c.g; heartColors[i3+2] = c.b;
  }

  const heartGeo = new THREE.BufferGeometry();
  heartGeo.setAttribute('position', new THREE.BufferAttribute(heartPos, 3));
  heartGeo.setAttribute('color', new THREE.BufferAttribute(heartColors, 3));

  const heartMat = new THREE.PointsMaterial({
    size: 0.055,
    vertexColors: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    transparent: true,
    opacity: 0.9
  });

  const heartMesh = new THREE.Points(heartGeo, heartMat);
  scene.add(heartMesh);

  /* 📸 GAMBAR TERSEBAR DALAM HEART */
  const loader = new THREE.TextureLoader();
  const imageMeshes = [];
  const imgs = ['pic1.jpg','pic2.jpg','pic3.jpg','pic4.jpg'];

  // Banyakkan gambar — setiap file muncul beberapa kali saiz berbeza
  var allImgDefs = [];
  imgs.forEach(function(src) {
    for (var k = 0; k < 6; k++) {
      allImgDefs.push(src);
    }
  });

  allImgDefs.forEach(function(src) {
    const tex = loader.load(src);
    const sz = Math.random() * 1.2 + 0.6;
    const mesh = new THREE.Mesh(
      new THREE.PlaneGeometry(sz, sz),
      new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0.9, depthWrite: false })
    );

    // Letak dalam kawasan heart
    var placed = false;
    var tries = 0;
    while (!placed && tries < 200) {
      tries++;
      const t = Math.random() * Math.PI * 2;
      const r = Math.random();
      const p = heartXY(t);
      const px = p.x * r + (Math.random()-0.5) * 0.5;
      const py = p.y * r + (Math.random()-0.5) * 0.5;
      const pz = (Math.random()-0.5) * 3;
      // Pastikan dalam kawasan heart (rough check)
      if (Math.abs(px) < 7 && py > -5 && py < 5) {
        mesh.position.set(px, py, pz);
        placed = true;
      }
    }
    if (!placed) mesh.position.set((Math.random()-0.5)*8, (Math.random()-0.5)*6, (Math.random()-0.5)*2);

    scene.add(mesh);
    imageMeshes.push(mesh);
  });

  /* 🎬 ZOOM + ROTATE ANIMATION */
  // Fasa: 0=zoom in, 1=zoom out, 2=rotate
  var phase = 0;
  var targetZ = 55;
  var rotateSpeed = 0;

  // Zoom in lepas 1 saat
  setTimeout(function() {
    phase = 0;
    targetZ = 8; // zoom in dekat
  }, 1000);

  // Zoom out lepas 5 saat
  setTimeout(function() {
    phase = 1;
    targetZ = 28;
  }, 5000);

  // Mula rotate lepas 8 saat
  setTimeout(function() {
    phase = 2;
    rotateSpeed = 0.004;
  }, 8000);

  /* 🎯 CLICK — love effect */
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  window.addEventListener('click', function(event) {
    if (canvas.style.display !== 'block') return;
    mouse.x = (event.clientX / innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hit = raycaster.intersectObjects(imageMeshes);
    if (hit.length > 0) spawnLove(hit[0].object.position);
  });

  function spawnLove(pos) {
    for (var i = 0; i < 5; i++) {
      const div = document.createElement('div');
      div.innerHTML = 'I love you ❤️';
      div.style.cssText = 'position:fixed;color:#ff69b4;font-family:Great Vibes,cursive;font-size:26px;text-shadow:0 0 10px #ff1493;pointer-events:none;z-index:99;';
      document.body.appendChild(div);
      const v = pos.clone().project(camera);
      let x = (v.x * 0.5 + 0.5) * innerWidth + (Math.random()-0.5)*80;
      let y = (-v.y * 0.5 + 0.5) * innerHeight + (Math.random()-0.5)*80;
      div.style.left = x + 'px';
      div.style.top = y + 'px';
      div.style.opacity = 1;
      let up = 0;
      const anim = setInterval(function() {
        up++;
        div.style.top = (y - up) + 'px';
        div.style.opacity -= 0.018;
        if (div.style.opacity <= 0) { clearInterval(anim); div.remove(); }
      }, 16);
    }
  }

  /* 🎬 ANIMATE LOOP */
  function animate() {
    requestAnimationFrame(animate);

    // Gambar sentiasa hadap camera
    imageMeshes.forEach(function(m) { m.lookAt(camera.position); });

    // Smooth zoom
    camera.position.z += (targetZ - camera.position.z) * 0.025;

    // Rotate heart
    heartMesh.rotation.y += rotateSpeed;
    imageMeshes.forEach(function(m) {
      m.position.applyEuler(new THREE.Euler(0, rotateSpeed, 0));
    });

    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener('resize', function() {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}
</script>

<script>
function check(){
  if(pass.value==='111498'){
    login.style.display='none';
    startMatrix();
  }
}

function startMatrix(){
  const phase = document.getElementById('matrix-phase');
  phase.style.display='block';
  const canvas = document.getElementById('matrixCanvas');
  const ctx = canvas.getContext('2d');

  canvas.width = innerWidth;
  canvas.height = innerHeight;

  const chars='アイウエオ0123456789♥';
  const size=14;
  const columns=canvas.width/size;
  const drops=Array.from({length:columns},()=>Math.random()*-50);

  const interval=setInterval(()=>{
    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#ff69b4";
    ctx.font=size+"px monospace";
    drops.forEach((y,i)=>{
      ctx.fillText(chars[Math.random()*chars.length|0],i*size,y*size);
      if(y*size>canvas.height && Math.random()>0.97) drops[i]=Math.random()*-20;
      drops[i]++;
    });
  },33);

  setTimeout(()=>{
    runCountdown(3,()=>{
      clearInterval(interval);
      phase.style.display='none';
      startEffect();
      fadeMusic();
    });
  },1500);
}

function runCountdown(n,cb){
  const el=document.getElementById('countdown-num');
  function show(num,done){
    el.textContent=num;
    el.style.opacity=1;
    setTimeout(()=>{ el.style.opacity=0; setTimeout(done,300); },700);
  }
  function next(){
    if(n<1) return cb();
    show(n--,()=>setTimeout(next,200));
  }
  next();
}

function fadeMusic(){
  music.volume=0;
  music.play();
  let v=0;
  const i=setInterval(()=>{
    if(v<1){v+=0.05;music.volume=v;}
    else clearInterval(i);
  },200);
}

let rainImg,rainHeart,rainWish;

function startEffect(){
  const images=['pic1.jpg','pic2.jpg','pic3.jpg','pic4.jpg'];

  rainImg=setInterval(()=>{
    const img=document.createElement('img');
    img.src=images[Math.random()*images.length|0];
    img.style.position='absolute';
    img.style.top='-100px';
    img.style.left=Math.random()*100+'%';
    img.style.width=(Math.random()*80+50)+'px';
    img.style.animation='fall 5s linear';
    document.body.appendChild(img);
    setTimeout(()=>img.remove(),5000);
  },300);

  rainHeart=setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"%";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  },200);

  rainWish=setInterval(()=>{
    const t=document.createElement('div');
    t.className='wish';
    t.innerHTML='happy birthday sayang ♥️';
    t.style.left=Math.random()*100+'%';
    t.style.top=Math.random()*80+'%';
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),4000);
  },500);

  setTimeout(()=>{ nextBtn.classList.add('show'); },10000);
}

function goNext(){
  clearInterval(rainImg);
  clearInterval(rainHeart);
  clearInterval(rainWish);
  document.querySelectorAll('.heart,.wish,img').forEach(el=>el.remove());
  nextBtn.style.display='none';
  document.querySelector('.webgl').style.display='block';
  document.body.style.background="black";
  setTimeout(()=>startGalaxy(),200);
}
</script>

</body>
</html>
